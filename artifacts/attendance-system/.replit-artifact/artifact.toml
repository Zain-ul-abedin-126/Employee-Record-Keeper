kind = "web"
previewPath = "/"
title = "Employee Attendance Management System"
version = "1.0.0"
id = "artifacts/attendance-system"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24620

[services.development]
run = "pnpm --filter @workspace/attendance-system run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/attendance-system", "run", "build" ]
publicDir = "artifacts/attendance-system/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24620"
BASE_PATH = "/"
